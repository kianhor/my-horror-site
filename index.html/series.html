<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Series Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo-mark">☠</div>
      <div class="brand-text">
        <h1>Horror Vault</h1>
        <p>Сериалы в формате карточек</p>
      </div>
    </div>

    <nav class="topnav">
  <a href="index.html" class="active">Главная</a>
      <a href="rating.html">Рейтинг</a>
      <a href="glossary.html">Глоссарий</a>
      <a href="cartoons.html">Мультфильмы</a>
      <a href="series.html">Сериалы</a>
      <a href="kino.html">фильмы</a>
    </nav>
  </header>

  <main class="page">
    <section class="panel">
      <div class="section-head">
        <h3>Список сериалов</h3>
      </div>

      <div class="controls">
        <input id="searchInput" type="text" placeholder="Поиск по названию">
        <select id="sortSelect">
          <option value="">Без сортировки</option>
          <option value="localRating">По рейтингу</option>
          <option value="localVotes">По популярности</option>
          <option value="year">По годам</option>
          <option value="genres">По жанрам</option>
        </select>
      </div>

      <div id="seriesGrid" class="movies-grid"></div>
    </section>
  </main>

  <script src="series.js"></script>
</body>
</html>
