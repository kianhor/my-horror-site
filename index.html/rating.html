<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horror Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-noise"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo-mark">☠</div>
      <div class="brand-text">
        <h1>Horror Vault</h1>
        <p>Мрачный рейтинг фильмов ужасов</p>
      </div>
    </div>

    <nav class="topnav">
      <a href="index.html" class="active">Главная</a>
      <a href="rating.html">Рейтинг</a>
      <a href="glossary.html">Глоссарий</a>
      <a href="cartoons.html">Мультфильмы</a>
      <a href="series.html">Сериалы</a>
      <a href="kino.html">фильмы</a>
    </nav>
  </header>

  <main class="page">
    <section class="hero">
      <div>
        <h2>Рейтинг самых жутких фильмов</h2>
        <p>Классика, слэшеры, сверхъестественный ужас и атмосфера ночного кошмара.</p>
      </div>
    </section>

    <section class="filters">
      <input id="searchInput" type="text" placeholder="Поиск фильма..." />
      <select id="genreFilter">
        <option value="">Все жанры</option>
        <option value="Слэшер">Слэшер</option>
        <option value="Психологический хоррор">Психологический хоррор</option>
        <option value="Сверхъестественный хоррор">Сверхъестественный хоррор</option>
        <option value="Зомби-хоррор">Зомби-хоррор</option>
        <option value="Фантастический хоррор">Фантастический хоррор</option>
      </select>
    </section>

    <section class="panel">
      <table class="rating-table" id="ratingTable">
        <thead>
          <tr>
            <th data-col="film" style="cursor:pointer;">Название фильма</th>
            <th data-col="genre" style="cursor:pointer;">Жанр</th>
            <th data-col="kinopoisk" style="cursor:pointer;">Рейтинг КиноПоиск</th>
            <th data-col="myRating" style="cursor:pointer;">Мой рейтинг</th>
            <th data-col="horrorRate" style="cursor:pointer;">Рейтинг ужаса</th>
          </tr>
        </thead>
        <tbody id="movieTableBody"></tbody>
      </table>
    </section>
  </main>

  <script src="movie.js"></script>
</body>
</html>
